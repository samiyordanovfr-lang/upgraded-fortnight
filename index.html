
<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaster AI - Text to Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-bold mb-2 gradient-text">ClipMaster AI Pro</h1>
        <p class="text-gray-400 mb-8">Превърни текста си във вирално видео за секунди.</p>

        <div class="card mb-8">
            <textarea id="promptInput" class="w-full p-4 rounded bg-gray-900 border border-gray-700 mb-4" rows="4" placeholder="Опиши твоето видео... (напр. 5 факта за Тесла)"></textarea>
            <button onclick="generateVideo()" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded font-bold transition">ГЕНЕРИРАЙ ВИДЕО С AI ✨</button>
        </div>

        <div id="result" class="hidden card text-left mb-8">
            <h3 class="font-bold text-xl mb-3">🎬 Готов сценарий и план:</h3>
            <div id="output" class="text-gray-300 space-y-2"></div>
            <div class="mt-4 p-3 bg-blue-900/30 border border-blue-500 rounded text-sm italic">
                Музикален стил: <span id="musicTag"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
            <div class="card border-gray-700">
                <h3 class="text-xl font-bold">БЕЗПЛАТЕН</h3>
                <p class="text-3xl font-bold my-4">$0 <span class="text-sm text-gray-400">/месец</span></p>
                <ul class="text-sm text-gray-400 text-left space-y-2 mb-6">
                    <li>✅ 3 видеа на месец</li>
                    <li>✅ Стандартно качество</li>
                </ul>
                <button class="w-full border border-gray-600 p-2 rounded">Текущ план</button>
            </div>
            <div class="card border-blue-500 scale-105 shadow-xl shadow-blue-500/20">
                <h3 class="text-xl font-bold text-blue-400">PRO ТИТАН</h3>
                <p class="text-3xl font-bold my-4">$49 <span class="text-sm text-gray-400">/месец</span></p>
                <ul class="text-sm text-gray-400 text-left space-y-2 mb-6">
                    <li>🚀 Неограничени видеа</li>
                    <li>🚀 4K Резолюция</li>
                    <li>🚀 Приоритетно генериране</li>
                </ul>
                <button class="w-full bg-blue-600 p-2 rounded">КУПИ СЕГА</button>
            </div>
        </div>
    </div>

    <script>
        async function generateVideo() {
            const btn = document.getElementById('mainBtn');
            const resDiv = document.getElementById('result');
            const output = document.getElementById('output');
            const prompt = document.getElementById('promptInput').value;
            
            if(!prompt) return alert('Напиши идея!');

            btn.innerText = "AI ГЕНЕРИРА СЦЕНАРИЙ И МУЗИКА...";
            btn.disabled = true;

            const res = await fetch(`/api/analyze?url=${encodeURIComponent(prompt)}`);
            const data = await res.json();

            btn.innerText = "ГЕНЕРИРАЙ ВИДЕО С AI ✨";
            btn.disabled = false;
            resDiv.classList.remove('hidden');
            
            output.innerHTML = "<strong>Заглавие:</strong> " + data.title + "<br><br>" +
                   "<strong>Сценарий:</strong> " + data.script + "<br><br>" +
                   "<strong>Вирален потенциал:</strong> " + data.viral_score;
            document.getElementById('musicTag').innerText = data.music;
        }
    </script>
</body>
</html>

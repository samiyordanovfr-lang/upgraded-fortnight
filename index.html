<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaster AI - Стани вирален</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; }
        .neon-glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="text-white font-sans selection:bg-purple-500">
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-10">
            <h1 class="text-6xl md:text-7xl font-black mb-4 bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 bg-clip-text text-transparent italic tracking-tighter">
                CLIPMASTER AI
            </h1>
            <p class="text-gray-400 text-lg md:text-xl max-w-lg mx-auto">
                Автоматично изрязване на най-добрите моменти от YouTube за TikTok и Reels.
            </p>
        </div>

        <div class="w-full max-w-2xl bg-gray-900/50 p-8 rounded-3xl border border-gray-800 neon-glow backdrop-blur-sm">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" placeholder="Постави YouTube линк тук..." 
                       class="flex-1 p-4 rounded-xl bg-black border border-purple-900/50 text-white focus:outline-none focus:ring-2 ring-purple-500 transition-all">
                <button class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-purple-500/20 transform hover:scale-105 active:scale-95 transition-all">
                    ГЕНЕРИРАЙ
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-4 italic">
                * AI обработката отнема около 30-60 секунди
            </p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-8 mt-16 text-sm font-mono">
            <div>
                <span class="block text-purple-500 text-2xl font-bold">100%</span>
                АВТОМАТИЧНО
            </div>
            <div>
                <span class="block text-pink-500 text-2xl font-bold">9:16</span>
                SMART CROP
            </div>

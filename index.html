<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaster AI - Стани вирален</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-extrabold mb-4 bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">
            ClipMaster AI
        </h1>
        <p class="text-xl mb-8 text-gray-400">Превърни YouTube видеа в TikTok хитове за секунди.</p>
        
        <div class="w-full max-w-md">
            <input id="videoLink" type="text" placeholder="Постави YouTube линк тук..." 
                   class="w-full p-4 rounded-lg bg-gray-900 border border-purple-500 text-white mb-4 focus:outline-none focus:ring-2 ring-purple-600">
            <button onclick="startAI()" id="mainButton" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-lg transition duration-300">
                Генерирай Видео
            </button>
            <p id="status" class="mt-4 text-purple-400 font-medium hidden"></p>
        </div>
        
        <footer class="mt-20 text-gray-600 text-sm">
            &copy; 2026 ClipMaster AI. Милионите те чакат.
        </footer>
    </div>

    <script>
        function startAI() {
            const link = document.getElementById('videoLink').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('mainButton');

            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                btn.disabled = true;
                btn.innerText = "Анализиране...";
                status.classList.remove('hidden');
                status.innerText = "🤖 AI сканира видеото за вирални моменти...";
                
                setTimeout(() => {
                    alert("Браво! Връзката е приета. В момента свързваме AI сървъра за рязане на клипове. Очаквай активация до часове!");
                    btn.disabled = false;
                    btn.innerText = "Генерирай Видео";
                    status.innerText = "";
                }, 3000);
            } else {
                alert("Моля, постави валиден YouTube линк!");
            }
        }
    </script>
</body>
</html>

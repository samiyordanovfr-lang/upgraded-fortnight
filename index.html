<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaster AI - Early Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-extrabold mb-4 bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent italic">
            ClipMaster AI
        </h1>
        <p class="text-xl mb-8 text-gray-400">Превърни YouTube видеа в TikTok хитове с един клик.</p>
        
        <div class="w-full max-w-md bg-gray-900/50 p-8 rounded-2xl border border-white/10 backdrop-blur-sm">
            <input id="videoLink" type="text" placeholder="Постави YouTube линк тук..." 
                   class="w-full p-4 rounded-lg bg-black border border-purple-500 text-white mb-4 focus:outline-none focus:ring-2 ring-purple-600">
            
            <button onclick="startAI()" id="mainButton" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:scale-105 text-white font-bold py-4 rounded-lg transition-all duration-300 shadow-lg shadow-purple-500/20">
                Генерирай Видео
            </button>

            <div id="emailSection" class="mt-8 pt-8 border-t border-white/10 hidden">
                <p class="text-sm text-purple-300 mb-4 font-medium italic underline">Ти си сред първите! Остави имейл за ранен достъп:</p>
                <input id="userEmail" type="email" placeholder="Твоят имейл..." 
                       class="w-full p-3 rounded-lg bg-black border border-gray-700 text-white mb-3 focus:outline-none focus:border-pink-500">
                <button onclick="saveEmail()" class="text-sm bg-white text-black font-bold py-2 px-6 rounded-full hover:bg-pink-500 hover:text-white transition-colors">
                    Запиши ме
                </button>
            </div>

            <p id="status" class="mt-4 text-purple-400 font-medium hidden"></p>
        </div>
        
        <footer class="mt-20 text-gray-600 text-xs tracking-widest uppercase">
            &copy; 2026 ClipMaster AI. Future is now.
        </footer>
    </div>

    <script>
        function startAI() {
            const link = document.getElementById('videoLink').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('mainButton');
            const emailSec = document.getElementById('emailSection');

            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                btn.disabled = true;
                btn.innerText = "АНАЛИЗИРАНЕ...";
                status.classList.remove('hidden');
                status.innerText = "🤖 AI търси вирални моменти...";
                
                setTimeout(() => {
                    btn.innerText = "ГОТОВО!";
                    status.innerText = "✅ Намерихме 3 вирални клипа!";
                    emailSec.classList.remove('hidden'); // Показваме полето за имейл
                }, 2500);
            } else {
                alert("Моля, постави валиден YouTube линк!");
            }
        }

        function saveEmail() {
            const email = document.getElementById('userEmail').value;
            if (email.includes('@')) {
                alert("Успешно! Ще получиш известие веднага щом клиповете са готови за теглене.");
                location.reload();
            } else {
                alert("Моля, въведи истински имейл.");
            }
        }
    </script>
</body>
</html>
